services:
  - type: web
    name: alt-data-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_URL
        value: https://alt-data-platform.vercel.app   # update after Vercel deploy
    plan: free
